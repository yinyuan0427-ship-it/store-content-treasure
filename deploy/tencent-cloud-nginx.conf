# TEMPUR 门店内容宝 · Nginx 配置
# 适用：腾讯云轻量应用服务器 Ubuntu 22.04
#
# 安装：
#   sudo cp deploy/tencent-cloud-nginx.conf /etc/nginx/sites-available/store-content
#   sudo ln -s /etc/nginx/sites-available/store-content /etc/nginx/sites-enabled/
#   sudo rm /etc/nginx/sites-enabled/default   # 删除默认站点
#   sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    server_name _;

    # 上传文件大小限制
    client_max_body_size 12m;

    # 静态文件根目录（npm run build 输出）
    # 请根据实际路径修改
    root /home/ubuntu/store-content-treasure/dist;
    index index.html;

    # ── Gzip 压缩 ──
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 1024;
    gzip_vary on;

    # ── API 代理到 Node.js ──
    location /api/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # ── 上传文件代理到 Node.js ──
    location /uploads/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_set_header Host $host;
        proxy_read_timeout 60s;
    }

    # ── 前端静态资源（带哈希的 JS/CSS/图片）──
    location /assets/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ── favicon / robots ──
    location = /favicon.ico {
        log_not_found off;
        access_log off;
    }

    location = /robots.txt {
        log_not_found off;
        access_log off;
    }

    # ── SPA fallback：所有非文件请求返回 index.html ──
    location / {
        try_files $uri $uri/ /index.html;
    }
}

